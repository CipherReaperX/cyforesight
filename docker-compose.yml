services:
  db:
    image: postgres:16-alpine
    container_name: tip-postgres
    environment:
      POSTGRES_DB: tip_db
      POSTGRES_USER: tip_user
      # Dev default — override via .env in production (POSTGRES_PASSWORD=strong_value)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyforesight_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip_user -d tip_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./tip-backend
      dockerfile: Dockerfile
    container_name: tip-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 10099
      DATABASE_URL: postgresql://tip_user:${POSTGRES_PASSWORD:-cyforesight_dev_pass}@db:5432/tip_db
      DATABASE_POOL_SIZE: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      # Dev default — MUST be overridden in production via .env (JWT_SECRET=random_64_char_string)
      JWT_SECRET: ${JWT_SECRET:-cyforesight_dev_jwt_secret_change_in_production}
      JWT_EXPIRY: 365d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FEATURE_ML_SCORING: "true"
      FEATURE_AUTO_ENRICHMENT: "true"
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
    ports:
      - "10099:10099"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tip-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
